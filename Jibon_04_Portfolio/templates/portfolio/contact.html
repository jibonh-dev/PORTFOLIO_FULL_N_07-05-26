{% extends 'portfolio/base.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<div class="container" style="max-width:600px;">
  <div class="card">
    <h2>Contact Me</h2>
    <form method="post" style="margin-top:16px;">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:14px;">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p style="color:#dc3545;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</p>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</div>
<style>
  input, textarea { width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:4px; font-size:14px; font-family:inherit; }
</style>
{% endblock %}
