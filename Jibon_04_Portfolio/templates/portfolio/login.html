{% extends 'portfolio/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;">
  <div class="card">
    <h2>Login</h2>
    <form method="post" style="margin-top:16px;">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:14px;">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p style="color:#dc3545;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</p>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn" style="width:100%;margin-top:6px;">Login</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:13px;">Don't have an account? <a href="{% url 'register' %}" style="color:#e94560;">Register</a></p>
  </div>
</div>
<style>input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;}</style>
{% endblock %}
