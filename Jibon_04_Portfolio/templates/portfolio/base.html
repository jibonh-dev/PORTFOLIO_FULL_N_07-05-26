<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Portfolio{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
  nav { background: #1a1a2e; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; }
  nav a { color: #eee; text-decoration: none; margin-left: 20px; font-size: 14px; }
  nav a:hover { color: #e94560; }
  nav .brand { color: #e94560; font-weight: bold; font-size: 18px; margin-left: 0; }
  .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .card { background: #fff; border-radius: 8px; padding: 30px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  h2 { color: #1a1a2e; margin-bottom: 16px; border-bottom: 2px solid #e94560; padding-bottom: 8px; }
  h3 { color: #1a1a2e; margin-bottom: 8px; }
  .btn { display: inline-block; padding: 8px 18px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
  .btn:hover { background: #c73652; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid #e94560; color: #e94560; }
  .btn-outline:hover { background: #e94560; color: #fff; }
  .btn-danger { background: #dc3545; }
  .btn-danger:hover { background: #b02a37; }
  .messages { list-style: none; margin-bottom: 16px; }
  .messages li { padding: 10px 14px; border-radius: 4px; margin-bottom: 6px; }
  .messages .success { background: #d4edda; color: #155724; }
  .messages .error { background: #f8d7da; color: #721c24; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
  th { background: #f0f0f0; font-weight: 600; }
  footer { text-align: center; padding: 20px; color: #888; font-size: 13px; margin-top: 40px; }
</style>
</head>
<body>
<nav>
  <a href="{% url 'home' %}" class="brand">Jibon Portfolio</a>
  <div>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'resume' %}">Resume</a>
    <a href="{% url 'contact' %}">Contact</a>
    {% if user.is_authenticated %}
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    {% endif %}
  </div>
</nav>

{% if messages %}
<div class="container" style="margin-top:20px;margin-bottom:0">
  <ul class="messages">
    {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}

{% block content %}{% endblock %}

<footer>&copy; 2024 Jibon Portfolio. All rights reserved.</footer>
</body>
</html>
